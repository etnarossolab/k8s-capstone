apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-app.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.api.env | default "production" | quote }}
  LOG_LEVEL: {{ .Values.api.logLevel | default "info" | quote }}
  DB_HOST: "postgres.{{ .Release.Namespace }}.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "appdb"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.minReplicas | default 2 }}
  selector:
    matchLabels: {tier: api}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels:
        {{- include "k8s-app.labels" . | nindent 8 }}
        tier: api
    spec:
      serviceAccountName: api-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: {type: RuntimeDefault}
      containers:
      - name: api
        image: kennethreitz/httpbin
        ports: [{containerPort: 80, name: http}]
        envFrom:
        - configMapRef:
            name: api-config
        resources:
          requests: {cpu: "200m", memory: "128Mi"}
          limits:   {cpu: "500m", memory: "256Mi"}
        readinessProbe:
          httpGet: {path: /get, port: http}
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /get, port: http}
          initialDelaySeconds: 20
          periodSeconds: 15
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-app.labels" . | nindent 4 }}
spec:
  selector: {tier: api}
  ports: [{port: 80, name: http}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: {{ .Values.api.minReplicas | default 2 }}
  maxReplicas: {{ .Values.api.maxReplicas | default 8 }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
