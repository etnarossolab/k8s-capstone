# Frontend SA — no API access needed
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-app.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
# API SA — needs to read ConfigMaps for runtime config
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-app.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
# Database SA — no API access (PostgreSQL doesn't need K8s API)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-app.labels" . | nindent 4 }}
automountServiceAccountToken: false
